apiVersion: v1
kind: Template
metadata:
  name: frontend-asset-proxy
objects:
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: frontend-asset-proxy
      labels:
        app: frontend-asset-proxy
    spec:
      replicas: ${{REPLICAS}}
      selector:
        matchLabels:
          app: frontend-asset-proxy
      template:
        metadata:
          labels:
            app: frontend-asset-proxy
        spec:
          containers:
            - name: frontend-asset-proxy
              image: ${IMAGE}:${IMAGE_TAG}
              ports:
                - containerPort: 8080
                  protocol: TCP
              env:
                - name: LOG_LEVEL
                  value: ${LOG_LEVEL}
              resources:
                requests:
                  cpu: ${CPU_REQUEST}
                  memory: ${MEMORY_REQUEST}
                limits:
                  cpu: ${CPU_LIMIT}
                  memory: ${MEMORY_LIMIT}
              livenessProbe:
                httpGet:
                  path: /healthz
                  port: 8080
                initialDelaySeconds: 10
                periodSeconds: 10
              readinessProbe:
                httpGet:
                  path: /healthz
                  port: 8080
                initialDelaySeconds: 5
                periodSeconds: 5

  - apiVersion: v1
    kind: Service
    metadata:
      name: frontend-asset-proxy
      labels:
        app: frontend-asset-proxy
    spec:
      ports:
        - port: 8080
          targetPort: 8080
          protocol: TCP
          name: http
      selector:
        app: frontend-asset-proxy

parameters:
  - name: ENV_NAME
    required: true
  - name: IMAGE_TAG
    required: true
  - name: IMAGE
    value: quay.io/cloudservices/landing-page-frontend
  - name: REPLICAS
    value: "3"
  - name: LOG_LEVEL
    value: info
  - name: CPU_REQUEST
    value: 250m
  - name: MEMORY_REQUEST
    value: 256Mi
  - name: CPU_LIMIT
    value: 500m
  - name: MEMORY_LIMIT
    value: 512Mi
